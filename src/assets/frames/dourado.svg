<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop metallic gold gradient for realism -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A7B33" />
      <stop offset="15%" stop-color="#EAC775" />
      <stop offset="30%" stop-color="#BE9648" />
      <stop offset="45%" stop-color="#FDF1A9" />
      <stop offset="55%" stop-color="#BE9648" />
      <stop offset="75%" stop-color="#F5D982" />
      <stop offset="90%" stop-color="#A18136" />
      <stop offset="100%" stop-color="#6E5520" />
    </linearGradient>

    <linearGradient id="gold-light" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C3" />
      <stop offset="50%" stop-color="#D1A751" />
      <stop offset="100%" stop-color="#7D5E1F" />
    </linearGradient>

    <!-- Drop shadow to elevate the frame elements -->
    <filter id="gold-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#241902" flood-opacity="0.5" />
    </filter>

    <!-- Individual baroque corner scroll element -->
    <g id="baroque-corner">
      <!-- Outer scroll curves -->
      <path d="M 0 0 C 40 10, 80 0, 110 -20 C 130 -35, 120 -60, 95 -60 C 70 -60, 60 -30, 80 -10 C 90 0, 105 -5, 105 -15 C 105 -25, 95 -30, 95 -25 C 95 -20, 100 -20, 100 -15 C 100 5, 50 15, 0 5 Z" />
      <path d="M 0 0 C 10 40, 0 80, -20 110 C -35 130, -60 120, -60 95 C -60 70, -30 60, -10 80 C 0 90, -5 105, -15 105 C -25 105, -30 95, -25 95 C -20 95, -20 100, -15 100 C 5 100, 15 50, 5 0 Z" />
      <!-- Acanthus leaf detail -->
      <path d="M 15 15 C 35 45, 65 65, 95 75 C 75 55, 45 35, 15 15 Z" />
      <path d="M 25 25 C 55 55, 75 85, 85 105 C 65 85, 45 65, 25 25 Z" />
      <circle cx="50" cy="50" r="10" />
      <circle cx="70" cy="30" r="6" />
      <circle cx="30" cy="70" r="6" />
      <circle cx="95" cy="20" r="4" />
      <circle cx="20" cy="95" r="4" />
    </g>

    <!-- Elegant leaf flourish for center borders -->
    <g id="baroque-center">
      <path d="M -80 0 C -40 -15, -10 -15, 0 -3 C -10 -25, -40 -25, -60 -10 Z" />
      <path d="M 80 0 C 40 -15, 10 -15, 0 -3 C 10 -25, 40 -25, 60 -10 Z" />
      <circle cx="0" cy="-6" r="8" />
      <circle cx="-25" cy="-8" r="5" />
      <circle cx="25" cy="-8" r="5" />
      <circle cx="-50" cy="-6" r="3" />
      <circle cx="50" cy="-6" r="3" />
      <!-- Small drop hanging -->
      <path d="M -5 0 L 5 0 L 0 15 Z" />
    </g>
  </defs>

  <!-- Ornate Golden Gilded Borders with metallic gradient -->
  <g fill="url(#gold-grad)" filter="url(#gold-shadow)">
    <!-- Outer Heavy Carved Frame -->
    <rect x="20" y="20" width="960" height="1210" fill="none" stroke="url(#gold-grad)" stroke-width="16" />
    <rect x="34" y="34" width="932" height="1182" fill="none" stroke="url(#gold-light)" stroke-width="4" />

    <!-- Middle Pattern/Beaded Line -->
    <rect x="48" y="48" width="904" height="1154" fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-dasharray="12 6" />

    <!-- Inner Fillet Frame -->
    <rect x="62" y="62" width="876" height="1126" fill="none" stroke="url(#gold-grad)" stroke-width="8" />
    <rect x="70" y="70" width="860" height="1110" fill="none" stroke="url(#gold-light)" stroke-width="2" />
    <!-- Fine inner line -->
    <rect x="80" y="80" width="840" height="1090" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
  </g>

  <!-- Placing Baroque Corners (rotated/positioned appropriately) -->
  <g fill="url(#gold-grad)" filter="url(#gold-shadow)">
    <!-- Top-Left Corner -->
    <use href="#baroque-corner" x="78" y="78" />
    <!-- Top-Right Corner -->
    <use href="#baroque-corner" x="922" y="78" transform="scale(-1, 1) translate(-1844, 0)" />
    <!-- Bottom-Left Corner -->
    <use href="#baroque-corner" x="78" y="1172" transform="scale(1, -1) translate(0, -2344)" />
    <!-- Bottom-Right Corner -->
    <use href="#baroque-corner" x="922" y="1172" transform="scale(-1, -1) translate(-1844, -2344)" />
  </g>

  <!-- Ornate Center Pieces on all four edges -->
  <g fill="url(#gold-grad)" filter="url(#gold-shadow)">
    <!-- Top Center -->
    <use href="#baroque-center" x="500" y="60" />
    <!-- Bottom Center -->
    <use href="#baroque-center" x="500" y="1190" transform="scale(1, -1) translate(0, -2380)" />
    <!-- Left Center -->
    <use href="#baroque-center" x="52" y="625" transform="rotate(90 52 625)" />
    <!-- Right Center -->
    <use href="#baroque-center" x="948" y="625" transform="rotate(-90 948 625)" />
  </g>

  <!-- Fine corner brace lines to complete the ornate picture frame look -->
  <g stroke="url(#gold-light)" stroke-width="2" fill="none">
    <path d="M 20 20 L 78 78" />
    <path d="M 980 20 L 922 78" />
    <path d="M 20 1230 L 78 1172" />
    <path d="M 980 1230 L 922 1172" />
  </g>
</svg>
