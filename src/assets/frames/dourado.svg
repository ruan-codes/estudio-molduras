<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer complex borders -->
  <rect x="25" y="25" width="950" height="1200" fill="none" stroke="#C8A24A" stroke-width="12" />
  <rect x="45" y="45" width="910" height="1160" fill="none" stroke="#B08D3E" stroke-width="4"/>
  <rect x="65" y="65" width="870" height="1120" fill="none" stroke="#C8A24A" stroke-width="2"/>
  <rect x="75" y="75" width="850" height="1100" fill="none" stroke="#C8A24A" stroke-width="1" stroke-dasharray="10, 5"/>
  
  <g fill="#C8A24A">
    <!-- Top Left Corner Intricate Ornament -->
    <path d="M 25 25 L 140 25 C 120 60, 90 90, 60 120 C 60 120, 25 140, 25 140 Z"/>
    <path d="M 45 45 C 80 80, 100 120, 150 150 C 120 100, 80 80, 45 45" fill="none" stroke="#C8A24A" stroke-width="4"/>
    <circle cx="130" cy="45" r="6" />
    <circle cx="45" cy="130" r="6" />
    <circle cx="160" cy="45" r="4" />
    <circle cx="45" cy="160" r="4" />
    <path d="M 75 75 Q 120 75 120 120 Q 120 90 150 90 Q 120 90 120 120 Q 120 75 165 75" fill="none" stroke="#C8A24A" stroke-width="2"/>
    
    <!-- Top Right Corner -->
    <g transform="translate(1000, 0) scale(-1, 1)">
      <path d="M 25 25 L 140 25 C 120 60, 90 90, 60 120 C 60 120, 25 140, 25 140 Z"/>
      <path d="M 45 45 C 80 80, 100 120, 150 150 C 120 100, 80 80, 45 45" fill="none" stroke="#C8A24A" stroke-width="4"/>
      <circle cx="130" cy="45" r="6" />
      <circle cx="45" cy="130" r="6" />
      <circle cx="160" cy="45" r="4" />
      <circle cx="45" cy="160" r="4" />
      <path d="M 75 75 Q 120 75 120 120 Q 120 90 150 90 Q 120 90 120 120 Q 120 75 165 75" fill="none" stroke="#C8A24A" stroke-width="2"/>
    </g>
    
    <!-- Bottom Left Corner -->
    <g transform="translate(0, 1250) scale(1, -1)">
      <path d="M 25 25 L 140 25 C 120 60, 90 90, 60 120 C 60 120, 25 140, 25 140 Z"/>
      <path d="M 45 45 C 80 80, 100 120, 150 150 C 120 100, 80 80, 45 45" fill="none" stroke="#C8A24A" stroke-width="4"/>
      <circle cx="130" cy="45" r="6" />
      <circle cx="45" cy="130" r="6" />
      <circle cx="160" cy="45" r="4" />
      <circle cx="45" cy="160" r="4" />
      <path d="M 75 75 Q 120 75 120 120 Q 120 90 150 90 Q 120 90 120 120 Q 120 75 165 75" fill="none" stroke="#C8A24A" stroke-width="2"/>
    </g>
    
    <!-- Bottom Right Corner -->
    <g transform="translate(1000, 1250) scale(-1, -1)">
      <path d="M 25 25 L 140 25 C 120 60, 90 90, 60 120 C 60 120, 25 140, 25 140 Z"/>
      <path d="M 45 45 C 80 80, 100 120, 150 150 C 120 100, 80 80, 45 45" fill="none" stroke="#C8A24A" stroke-width="4"/>
      <circle cx="130" cy="45" r="6" />
      <circle cx="45" cy="130" r="6" />
      <circle cx="160" cy="45" r="4" />
      <circle cx="45" cy="160" r="4" />
      <path d="M 75 75 Q 120 75 120 120 Q 120 90 150 90 Q 120 90 120 120 Q 120 75 165 75" fill="none" stroke="#C8A24A" stroke-width="2"/>
    </g>
  </g>

  <!-- Ornate centers of each edge -->
  <g fill="#C8A24A">
    <!-- Top Center -->
    <path d="M 430 25 L 570 25 L 530 55 L 470 55 Z"/>
    <circle cx="500" cy="65" r="8"/>
    <circle cx="470" cy="62" r="5"/>
    <circle cx="530" cy="62" r="5"/>
    
    <!-- Bottom Center -->
    <g transform="translate(0, 1250) scale(1, -1)">
      <path d="M 430 25 L 570 25 L 530 55 L 470 55 Z"/>
      <circle cx="500" cy="65" r="8"/>
      <circle cx="470" cy="62" r="5"/>
      <circle cx="530" cy="62" r="5"/>
    </g>
    
    <!-- Left Center -->
    <path d="M 25 550 L 25 700 L 55 660 L 55 590 Z"/>
    <circle cx="65" cy="625" r="8"/>
    <circle cx="62" cy="595" r="5"/>
    <circle cx="62" cy="655" r="5"/>
    
    <!-- Right Center -->
    <g transform="translate(1000, 0) scale(-1, 1)">
      <path d="M 25 550 L 25 700 L 55 660 L 55 590 Z"/>
      <circle cx="65" cy="625" r="8"/>
      <circle cx="62" cy="595" r="5"/>
      <circle cx="62" cy="655" r="5"/>
    </g>
  </g>
  
  <g stroke="#C8A24A" stroke-width="2" fill="none">
     <path d="M 120 65 C 160 100, 100 160, 65 120"/>
     <path d="M 880 65 C 840 100, 900 160, 935 120"/>
     <path d="M 120 1185 C 160 1150, 100 1090, 65 1130"/>
     <path d="M 880 1185 C 840 1150, 900 1090, 935 1130"/>
  </g>
</svg>
