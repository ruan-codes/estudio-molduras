<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="candy-cane" x="0" y="0" width="40" height="40" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#F4EFE4"/>
      <rect width="20" height="40" fill="#C23B3B"/>
      <line x1="25" y1="0" x2="25" y2="40" stroke="#2F5D3A" stroke-width="2"/>
      <line x1="35" y1="0" x2="35" y2="40" stroke="#2F5D3A" stroke-width="2"/>
    </pattern>
    <g id="holly">
      <ellipse cx="0" cy="0" rx="25" ry="12" fill="#2F5D3A" transform="rotate(-30)"/>
      <ellipse cx="20" cy="15" rx="25" ry="12" fill="#2F5D3A" transform="rotate(30 20 15)"/>
      <ellipse cx="-10" cy="20" rx="20" ry="10" fill="#1C3D25" transform="rotate(0 -10 20)"/>
      <circle cx="5" cy="12" r="8" fill="#C23B3B"/>
      <circle cx="20" cy="20" r="8" fill="#C23B3B"/>
      <circle cx="10" cy="25" r="8" fill="#911C1C"/>
      <circle cx="3" cy="10" r="2" fill="#FFF" opacity="0.6"/>
      <circle cx="18" cy="18" r="2" fill="#FFF" opacity="0.6"/>
    </g>
    <g id="snowflake">
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>
      <line x1="-10" y1="-10" x2="10" y2="10" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>
      <line x1="-10" y1="10" x2="10" y2="-10" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3" fill="#FFF"/>
    </g>
  </defs>

  <!-- Ornate Candy Cane border around the entire window -->
  <rect x="25" y="25" width="950" height="1200" fill="none" stroke="#C23B3B" stroke-width="24"/>
  <rect x="30" y="30" width="940" height="1190" fill="none" stroke="url(#candy-cane)" stroke-width="14"/>
  <rect x="42" y="42" width="916" height="1166" fill="none" stroke="#2F5D3A" stroke-width="3"/>
  
  <rect x="58" y="58" width="884" height="1134" fill="none" stroke="#2F5D3A" stroke-width="1"/>

  <!-- Complex Lights string -->
  <path d="M 25 80 Q 200 40, 350 80 T 650 80 T 975 80" stroke="#1C3D25" stroke-width="3" fill="none"/>
  <path d="M 25 100 Q 150 140, 300 100 T 700 100 T 975 100" stroke="#2F5D3A" stroke-width="2" fill="none"/>
  
  <g>
    <circle cx="100" cy="62" r="12" fill="#C23B3B"/> <circle cx="98" cy="58" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="200" cy="74" r="12" fill="#D9A93B"/> <circle cx="198" cy="70" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="300" cy="80" r="12" fill="#2F5D3A"/> <circle cx="298" cy="76" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="400" cy="64" r="12" fill="#C23B3B"/> <circle cx="398" cy="60" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="500" cy="80" r="12" fill="#D9A93B"/> <circle cx="498" cy="76" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="600" cy="64" r="12" fill="#2F5D3A"/> <circle cx="598" cy="60" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="700" cy="80" r="12" fill="#C23B3B"/> <circle cx="698" cy="76" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="800" cy="74" r="12" fill="#D9A93B"/> <circle cx="798" cy="70" r="4" fill="#FFF" opacity="0.6"/>
    <circle cx="900" cy="62" r="12" fill="#2F5D3A"/> <circle cx="898" cy="58" r="4" fill="#FFF" opacity="0.6"/>

    <!-- Bottom string lights -->
    <path d="M 25 1180 Q 200 1140, 500 1180 T 975 1180" stroke="#2F5D3A" stroke-width="3" fill="none"/>
    <circle cx="150" cy="1165" r="10" fill="#C23B3B"/> <circle cx="148" cy="1162" r="3" fill="#FFF" opacity="0.6"/>
    <circle cx="350" cy="1173" r="10" fill="#D9A93B"/> <circle cx="348" cy="1170" r="3" fill="#FFF" opacity="0.6"/>
    <circle cx="650" cy="1173" r="10" fill="#2F5D3A"/> <circle cx="648" cy="1170" r="3" fill="#FFF" opacity="0.6"/>
    <circle cx="850" cy="1165" r="10" fill="#C23B3B"/> <circle cx="848" cy="1162" r="3" fill="#FFF" opacity="0.6"/>
  </g>

  <!-- Holly Corners -->
  <use href="#holly" x="70" y="70" />
  <use href="#holly" x="930" y="70" transform="scale(-1, 1) translate(-1860, 0)" />
  <use href="#holly" x="70" y="1180" transform="scale(1, -1) translate(0, -2360)" />
  <use href="#holly" x="930" y="1180" transform="scale(-1, -1) translate(-1860, -2360)" />

  <!-- Snowflakes -->
  <g fill="#FFF">
    <use href="#snowflake" x="120" y="1120" transform="scale(1.2)"/>
    <use href="#snowflake" x="880" y="1120" transform="scale(1.2)"/>
    <use href="#snowflake" x="500" y="1140" transform="scale(1.5)"/>
    <use href="#snowflake" x="250" y="1100" transform="scale(0.8)"/>
    <use href="#snowflake" x="750" y="1100" transform="scale(0.8)"/>
  </g>
</svg>