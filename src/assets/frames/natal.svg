<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Candy cane diagonal pattern -->
    <pattern id="candy-cane" x="0" y="0" width="40" height="40" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#F4EFE4"/>
      <rect width="20" height="40" fill="#C23B3B"/>
      <line x1="25" y1="0" x2="25" y2="40" stroke="#2F5D3A" stroke-width="2"/>
      <line x1="35" y1="0" x2="35" y2="40" stroke="#2F5D3A" stroke-width="2"/>
    </pattern>

    <!-- Velvet Red & Gold Trim Gradients -->
    <linearGradient id="red-velvet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9E1E1E" />
      <stop offset="40%" stop-color="#C23B3B" />
      <stop offset="70%" stop-color="#D65050" />
      <stop offset="100%" stop-color="#701010" />
    </linearGradient>

    <linearGradient id="gold-trim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BE9648" />
      <stop offset="50%" stop-color="#FDF1A9" />
      <stop offset="100%" stop-color="#A18136" />
    </linearGradient>

    <!-- Radial glows for the lights -->
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="30%" stop-color="#FF5C5C" />
      <stop offset="70%" stop-color="#C23B3B" />
      <stop offset="100%" stop-color="#C23B3B" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="30%" stop-color="#FFF48F" />
      <stop offset="70%" stop-color="#D9A93B" />
      <stop offset="100%" stop-color="#D9A93B" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="30%" stop-color="#7AFF8F" />
      <stop offset="70%" stop-color="#2F5D3A" />
      <stop offset="100%" stop-color="#2F5D3A" stop-opacity="0" />
    </radialGradient>

    <!-- Holly Cluster Template -->
    <g id="holly">
      <!-- Dark green leaves with veins -->
      <path d="M 0 0 C -30 -10, -50 -5, -60 10 C -45 15, -40 30, -5 5 C -25 25, -20 40, 0 45 C 5 25, 20 20, 0 0 Z" fill="#1C3D25" stroke="#2F5D3A" stroke-width="1.5"/>
      <path d="M -60 10 C -75 25, -70 45, -45 40 C -35 30, -25 35, -5 5 Z" fill="#2F5D3A" stroke="#4C8C4A" stroke-width="1"/>
      <!-- Symmetric leaves -->
      <g transform="scale(-1, 1)">
        <path d="M 0 0 C -30 -10, -50 -5, -60 10 C -45 15, -40 30, -5 5 C -25 25, -20 40, 0 45 C 5 25, 20 20, 0 0 Z" fill="#1C3D25" stroke="#2F5D3A" stroke-width="1.5"/>
      </g>
      <!-- Glossy red berries -->
      <circle cx="-10" cy="20" r="10" fill="url(#red-velvet)"/>
      <circle cx="-13" cy="17" r="3" fill="#FFF" opacity="0.8"/>
      
      <circle cx="10" cy="20" r="10" fill="url(#red-velvet)"/>
      <circle cx="7" cy="17" r="3" fill="#FFF" opacity="0.8"/>

      <circle cx="0" cy="32" r="11" fill="url(#red-velvet)"/>
      <circle cx="-3" cy="29" r="3.5" fill="#FFF" opacity="0.8"/>
    </g>

    <!-- Snowflake Template -->
    <g id="snowflake">
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFF" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#FFF" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="-11" y1="-11" x2="11" y2="11" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-11" y1="11" x2="11" y2="-11" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="4.5" fill="#FFF"/>
    </g>

    <!-- Velvet Christmas Bow -->
    <g id="christmas-bow">
      <!-- Ribbon Tails -->
      <path d="M -25 0 C -40 40, -80 80, -90 130 L -50 130 C -40 90, -10 50, -5 0 Z" fill="url(#red-velvet)" stroke="url(#gold-trim)" stroke-width="2.5"/>
      <path d="M 25 0 C 40 40, 80 80, 90 130 L 50 130 C 40 90, 10 50, 5 0 Z" fill="url(#red-velvet)" stroke="url(#gold-trim)" stroke-width="2.5"/>
      <!-- Left Loop -->
      <path d="M 0 0 C -40 -30, -110 -40, -110 -5 C -110 30, -50 20, 0 0 Z" fill="url(#red-velvet)" stroke="url(#gold-trim)" stroke-width="3"/>
      <path d="M -20 -8 C -50 -20, -90 -25, -90 -5 C -90 15, -50 10, -20 -8" fill="none" stroke="url(#gold-trim)" stroke-width="1.5" opacity="0.7"/>
      <!-- Right Loop -->
      <path d="M 0 0 C 40 -30, 110 -40, 110 -5 C 110 30, 50 20, 0 0 Z" fill="url(#red-velvet)" stroke="url(#gold-trim)" stroke-width="3"/>
      <path d="M 20 -8 C 50 -20, 90 -25, 90 -5 C 90 15, 50 10, 20 -8" fill="none" stroke="url(#gold-trim)" stroke-width="1.5" opacity="0.7"/>
      <!-- Center Knot -->
      <rect x="-18" y="-18" width="36" height="36" rx="8" fill="url(#red-velvet)" stroke="url(#gold-trim)" stroke-width="3" />
      <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#gold-trim)" stroke-width="1" opacity="0.5"/>
    </g>
  </defs>

  <!-- Ornate Candy Cane border around the entire window -->
  <rect x="25" y="25" width="950" height="1200" fill="none" stroke="#C23B3B" stroke-width="24"/>
  <rect x="30" y="30" width="940" height="1190" fill="none" stroke="url(#candy-cane)" stroke-width="14"/>
  <rect x="42" y="42" width="916" height="1166" fill="none" stroke="#2F5D3A" stroke-width="3"/>
  <rect x="58" y="58" width="884" height="1134" fill="none" stroke="#2F5D3A" stroke-width="1"/>

  <!-- Complex Lights string with glowing bulb gradients -->
  <g>
    <!-- Wire lines -->
    <path d="M 25 80 Q 200 40, 350 80 T 650 80 T 975 80" stroke="#1C3D25" stroke-width="3" fill="none"/>
    <path d="M 25 100 Q 150 140, 300 100 T 700 100 T 975 100" stroke="#2F5D3A" stroke-width="2" fill="none"/>

    <!-- Glowing lights -->
    <g>
      <!-- Red glows -->
      <circle cx="100" cy="62" r="30" fill="url(#glow-red)" /> <circle cx="100" cy="62" r="10" fill="#FFF" />
      <circle cx="400" cy="64" r="30" fill="url(#glow-red)" /> <circle cx="400" cy="64" r="10" fill="#FFF" />
      <circle cx="700" cy="80" r="30" fill="url(#glow-red)" /> <circle cx="700" cy="80" r="10" fill="#FFF" />
      
      <!-- Gold glows -->
      <circle cx="200" cy="74" r="30" fill="url(#glow-gold)" /> <circle cx="200" cy="74" r="10" fill="#FFF" />
      <circle cx="500" cy="80" r="30" fill="url(#glow-gold)" /> <circle cx="500" cy="80" r="10" fill="#FFF" />
      <circle cx="800" cy="74" r="30" fill="url(#glow-gold)" /> <circle cx="800" cy="74" r="10" fill="#FFF" />

      <!-- Green glows -->
      <circle cx="300" cy="80" r="30" fill="url(#glow-green)" /> <circle cx="300" cy="80" r="10" fill="#FFF" />
      <circle cx="600" cy="64" r="30" fill="url(#glow-green)" /> <circle cx="600" cy="64" r="10" fill="#FFF" />
      <circle cx="900" cy="62" r="30" fill="url(#glow-green)" /> <circle cx="900" cy="62" r="10" fill="#FFF" />
    </g>

    <!-- Bottom string lights -->
    <path d="M 25 1180 Q 200 1140, 500 1180 T 975 1180" stroke="#2F5D3A" stroke-width="3" fill="none"/>
    <g>
      <circle cx="150" cy="1165" r="26" fill="url(#glow-red)" /> <circle cx="150" cy="1165" r="8" fill="#FFF" />
      <circle cx="350" cy="1173" r="26" fill="url(#glow-gold)" /> <circle cx="350" cy="1173" r="8" fill="#FFF" />
      <circle cx="650" cy="1173" r="26" fill="url(#glow-green)" /> <circle cx="650" cy="1173" r="8" fill="#FFF" />
      <circle cx="850" cy="1165" r="26" fill="url(#glow-red)" /> <circle cx="850" cy="1165" r="8" fill="#FFF" />
    </g>
  </g>

  <!-- Holly Clusters at four corners -->
  <use href="#holly" x="80" y="80" />
  <use href="#holly" x="920" y="80" transform="scale(-1, 1) translate(-1840, 0)" />
  <use href="#holly" x="80" y="1170" transform="scale(1, -1) translate(0, -2340)" />
  <use href="#holly" x="920" y="1170" transform="scale(-1, -1) translate(-1840, -2340)" />

  <!-- Snowflakes scattered on the borders -->
  <g fill="#FFF" opacity="0.9">
    <use href="#snowflake" x="120" y="1110" transform="scale(1.3)"/>
    <use href="#snowflake" x="880" y="1110" transform="scale(1.3)"/>
    <use href="#snowflake" x="500" y="1135" transform="scale(1.5)"/>
    <use href="#snowflake" x="270" y="1090" transform="scale(0.95)"/>
    <use href="#snowflake" x="730" y="1090" transform="scale(0.95)"/>
  </g>

  <!-- Heavy velvet red bow with gold trim at the top center -->
  <use href="#christmas-bow" x="500" y="65" />
</svg>