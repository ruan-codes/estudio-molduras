<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stripes" width="15" height="15" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="15" stroke="#FFF" stroke-width="6" opacity="0.4"/>
    </pattern>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="4" fill="#FFF" opacity="0.4"/>
    </pattern>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#FFF" stroke-width="2" opacity="0.5"/>
    </pattern>
  </defs>

  <g opacity="0.9">
    <!-- Top Left -->
    <rect x="-10" y="10" width="160" height="40" fill="#E08A2E" transform="rotate(-20 60 30)"/>
    <rect x="-10" y="10" width="160" height="40" fill="url(#stripes)" transform="rotate(-20 60 30)"/>
    <rect x="10" y="40" width="120" height="35" fill="#4FA8A0" transform="rotate(-40 70 57)"/>
    <rect x="10" y="40" width="120" height="35" fill="url(#dots)" transform="rotate(-40 70 57)"/>
    
    <!-- Top Right -->
    <rect x="840" y="15" width="150" height="45" fill="#4FA8A0" transform="rotate(30 915 37)"/>
    <rect x="840" y="15" width="150" height="45" fill="url(#grid)" transform="rotate(30 915 37)"/>
    <rect x="870" y="55" width="130" height="30" fill="#D9534F" transform="rotate(15 935 70)"/>
    <rect x="870" y="55" width="130" height="30" fill="url(#stripes)" transform="rotate(15 935 70)"/>
    
    <!-- Bottom Left -->
    <rect x="-20" y="1170" width="170" height="45" fill="#D9534F" transform="rotate(25 65 1192)"/>
    <rect x="-20" y="1170" width="170" height="45" fill="url(#dots)" transform="rotate(25 65 1192)"/>
    <rect x="10" y="1140" width="110" height="35" fill="#C8A24A" transform="rotate(45 65 1157)"/>
    <rect x="10" y="1140" width="110" height="35" fill="url(#stripes)" transform="rotate(45 65 1157)"/>
    
    <!-- Bottom Right -->
    <rect x="850" y="1180" width="160" height="40" fill="#C8A24A" transform="rotate(-22 930 1200)"/>
    <rect x="850" y="1180" width="160" height="40" fill="url(#stripes)" transform="rotate(-22 930 1200)"/>
    <rect x="880" y="1140" width="100" height="30" fill="#E08A2E" transform="rotate(-45 930 1155)"/>
    <rect x="880" y="1140" width="100" height="30" fill="url(#grid)" transform="rotate(-45 930 1155)"/>

    <!-- Additional scattered small tapes on the borders -->
    <rect x="450" y="-15" width="100" height="35" fill="#E08A2E" opacity="0.8" transform="rotate(5 500 -2)"/>
    <rect x="450" y="-15" width="100" height="35" fill="url(#dots)" opacity="0.8" transform="rotate(5 500 -2)"/>

    <rect x="470" y="1235" width="110" height="35" fill="#4FA8A0" opacity="0.8" transform="rotate(-8 525 1250)"/>
    <rect x="470" y="1235" width="110" height="35" fill="url(#stripes)" opacity="0.8" transform="rotate(-8 525 1250)"/>
    
    <rect x="-15" y="550" width="40" height="120" fill="#C8A24A" opacity="0.8" transform="rotate(3 5 610)"/>
    <rect x="-15" y="550" width="40" height="120" fill="url(#grid)" opacity="0.8" transform="rotate(3 5 610)"/>

    <rect x="975" y="650" width="45" height="110" fill="#D9534F" opacity="0.8" transform="rotate(-5 990 700)"/>
    <rect x="975" y="650" width="45" height="110" fill="url(#dots)" opacity="0.8" transform="rotate(-5 990 700)"/>
  </g>
</svg>
