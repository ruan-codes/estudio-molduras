<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="sparkle">
      <path d="M 0 -20 Q 0 0, 20 0 Q 0 0, 0 20 Q 0 0, -20 0 Q 0 0, 0 -20 Z" fill="#D9B45C"/>
      <circle cx="0" cy="0" r="3" fill="#FFF"/>
    </g>
    <g id="firework">
      <path d="M 0 -40 L 0 -10 M 0 40 L 0 10 M -40 0 L -10 0 M 40 0 L 10 0 M -28 -28 L -7 -7 M 28 28 L 7 7 M -28 28 L -7 7 M 28 -28 L 7 -7" stroke="#D9B45C" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="6" fill="#D9B45C"/>
    </g>
  </defs>

  <!-- Art Deco ornate borders -->
  <rect x="20" y="20" width="960" height="1210" fill="none" stroke="#D9B45C" stroke-width="4"/>
  <rect x="30" y="30" width="940" height="1190" fill="none" stroke="#D9B45C" stroke-width="12"/>
  <rect x="48" y="48" width="904" height="1154" fill="none" stroke="#D9B45C" stroke-width="2"/>
  
  <path d="M 30 150 L 150 30" stroke="#D9B45C" stroke-width="6" fill="none"/>
  <path d="M 850 30 L 970 150" stroke="#D9B45C" stroke-width="6" fill="none"/>
  <path d="M 30 1100 L 150 1220" stroke="#D9B45C" stroke-width="6" fill="none"/>
  <path d="M 850 1220 L 970 1100" stroke="#D9B45C" stroke-width="6" fill="none"/>

  <g fill="none" stroke="#D9B45C" stroke-width="3">
    <!-- Corner Art Deco lines -->
    <path d="M 60 120 L 120 60"/>
    <path d="M 80 140 L 140 80"/>
    <path d="M 880 60 L 940 120"/>
    <path d="M 860 80 L 920 140"/>
    
    <path d="M 60 1130 L 120 1190"/>
    <path d="M 80 1110 L 140 1170"/>
    <path d="M 880 1190 L 940 1130"/>
    <path d="M 860 1170 L 920 1110"/>
  </g>

  <!-- Corner ornaments -->
  <g fill="#D9B45C">
    <polygon points="30,30 80,30 30,80" />
    <polygon points="970,30 920,30 970,80" />
    <polygon points="30,1220 80,1220 30,1170" />
    <polygon points="970,1220 920,1220 970,1170" />
  </g>

  <!-- Fireworks and sparkles -->
  <use href="#firework" x="250" y="80" transform="scale(1.2)"/>
  <use href="#firework" x="750" y="80" transform="scale(1.2)"/>
  <use href="#firework" x="150" y="1150" transform="scale(0.8)"/>
  <use href="#firework" x="850" y="1150" transform="scale(0.8)"/>
  
  <use href="#sparkle" x="150" y="100"/>
  <use href="#sparkle" x="850" y="100"/>
  <use href="#sparkle" x="350" y="120"/>
  <use href="#sparkle" x="650" y="120"/>
  <use href="#sparkle" x="500" y="60" transform="scale(1.5)"/>
  <use href="#sparkle" x="500" y="1190" transform="scale(1.5)"/>
  
  <use href="#sparkle" x="250" y="1180"/>
  <use href="#sparkle" x="750" y="1180"/>
  <use href="#sparkle" x="400" y="1160"/>
  <use href="#sparkle" x="600" y="1160"/>

  <!-- Champagne bubbles overlay effect -->
  <g fill="#D9B45C" opacity="0.6">
    <circle cx="80" cy="300" r="10"/> <circle cx="90" cy="280" r="5"/> <circle cx="70" cy="250" r="8"/>
    <circle cx="85" cy="220" r="4"/> <circle cx="75" cy="190" r="6"/> <circle cx="95" cy="160" r="3"/>
    
    <circle cx="920" cy="1000" r="12"/> <circle cx="910" cy="970" r="6"/> <circle cx="930" cy="940" r="9"/>
    <circle cx="915" cy="910" r="4"/> <circle cx="925" cy="880" r="7"/> <circle cx="905" cy="850" r="3"/>
    
    <circle cx="90" cy="900" r="8"/> <circle cx="100" cy="870" r="4"/> <circle cx="80" cy="840" r="6"/>
    <circle cx="920" cy="400" r="10"/> <circle cx="930" cy="370" r="5"/> <circle cx="910" cy="340" r="7"/>
  </g>
</svg>