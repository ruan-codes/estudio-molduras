<svg width="1000" height="1250" viewBox="0 0 1000 1250" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich gold metallic gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A7B33" />
      <stop offset="15%" stop-color="#EAC775" />
      <stop offset="30%" stop-color="#BE9648" />
      <stop offset="50%" stop-color="#FDF1A9" />
      <stop offset="70%" stop-color="#BE9648" />
      <stop offset="85%" stop-color="#F5D982" />
      <stop offset="100%" stop-color="#6E5520" />
    </linearGradient>

    <linearGradient id="gold-light" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C3" />
      <stop offset="50%" stop-color="#D1A751" />
      <stop offset="100%" stop-color="#7D5E1F" />
    </linearGradient>

    <!-- Glass transparency gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#FFF" stop-opacity="0.2"/>
      <stop offset="75%" stop-color="#FFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Shadow filter for Art Deco look -->
    <filter id="deco-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#1F1500" flood-opacity="0.5" />
    </filter>

    <!-- Sparkle Asset -->
    <g id="sparkle">
      <path d="M 0 -24 Q 0 0, 24 0 Q 0 0, 0 24 Q 0 0, -24 0 Q 0 0, 0 -24 Z" fill="url(#gold-grad)"/>
      <circle cx="0" cy="0" r="4" fill="#FFF"/>
    </g>

    <!-- Firework Starburst Asset -->
    <g id="firework">
      <circle cx="0" cy="0" r="7" fill="url(#gold-grad)"/>
      <!-- Radiating lines -->
      <path d="M 0 -50 L 0 -15 M 0 50 L 0 15 M -50 0 L -15 0 M 50 0 L 15 0 M -35 -35 L -10 -10 M 35 35 L 10 10 M -35 35 L -10 10 M 35 -35 L 10 -10" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Outer spark dots -->
      <circle cx="0" cy="-65" r="4.5" fill="#FFF" />
      <circle cx="0" cy="65" r="4.5" fill="#FFF" />
      <circle cx="-65" cy="0" r="4.5" fill="#FFF" />
      <circle cx="65" cy="0" r="4.5" fill="#FFF" />
      <circle cx="-46" cy="-46" r="3.5" fill="url(#gold-grad)" />
      <circle cx="46" cy="46" r="3.5" fill="url(#gold-grad)" />
      <circle cx="-46" cy="46" r="3.5" fill="url(#gold-grad)" />
      <circle cx="46" cy="-46" r="3.5" fill="url(#gold-grad)" />
    </g>

    <!-- Champagne Glass Template -->
    <g id="champagne-glass">
      <!-- Bowl -->
      <path d="M-15 -60 L15 -60 L18 -10 C18 10, -18 10, -18 -10 Z" fill="url(#glass-grad)" stroke="url(#gold-grad)" stroke-width="2" />
      <!-- Liquid inside -->
      <path d="M-17 -35 L17 -35 L16.5 -10 C16.5 6, -16.5 6, -16.5 -10 Z" fill="url(#gold-grad)" opacity="0.7"/>
      <!-- Stem -->
      <line x1="0" y1="5" x2="0" y2="55" stroke="url(#gold-grad)" stroke-width="4" />
      <!-- Foot -->
      <ellipse cx="0" cy="55" rx="20" ry="5" fill="url(#glass-grad)" stroke="url(#gold-grad)" stroke-width="2" />
      <!-- Bubbles inside glass -->
      <circle cx="-5" cy="-15" r="2" fill="#FFF" opacity="0.9"/>
      <circle cx="5" cy="-25" r="2.5" fill="#FFF" opacity="0.9"/>
      <circle cx="-2" cy="-30" r="1.5" fill="#FFF" opacity="0.9"/>
    </g>
  </defs>

  <!-- Art Deco ornate borders -->
  <g fill="none" stroke="url(#gold-grad)" filter="url(#deco-shadow)">
    <rect x="20" y="20" width="960" height="1210" stroke-width="4"/>
    <rect x="30" y="30" width="940" height="1190" stroke-width="12"/>
    <rect x="48" y="48" width="904" height="1154" stroke-width="2"/>
    
    <!-- Corner Art Deco structural lines -->
    <path d="M 30 150 L 150 30" stroke-width="6"/>
    <path d="M 850 30 L 970 150" stroke-width="6"/>
    <path d="M 30 1100 L 150 1220" stroke-width="6"/>
    <path d="M 850 1220 L 970 1100" stroke-width="6"/>

    <path d="M 60 120 L 120 60" stroke-width="2.5"/>
    <path d="M 80 140 L 140 80" stroke-width="2.5"/>
    <path d="M 880 60 L 940 120" stroke-width="2.5"/>
    <path d="M 860 80 L 920 140" stroke-width="2.5"/>
    
    <path d="M 60 1130 L 120 1190" stroke-width="2.5"/>
    <path d="M 80 1110 L 140 1170" stroke-width="2.5"/>
    <path d="M 880 1190 L 940 1130" stroke-width="2.5"/>
    <path d="M 860 1170 L 920 1110" stroke-width="2.5"/>
  </g>

  <!-- Corner solid ornaments -->
  <g fill="url(#gold-grad)" filter="url(#deco-shadow)">
    <polygon points="30,30 90,30 30,90" />
    <polygon points="970,30 910,30 970,90" />
    <polygon points="30,1220 90,1220 30,1160" />
    <polygon points="970,1220 910,1220 970,1160" />
  </g>

  <!-- Clock pointing to midnight at top center -->
  <g transform="translate(500, 75)" filter="url(#deco-shadow)">
    <circle cx="0" cy="0" r="48" fill="#1A1815" stroke="url(#gold-grad)" stroke-width="5" />
    <circle cx="0" cy="0" r="41" fill="none" stroke="url(#gold-light)" stroke-width="1.5" />
    <!-- Clock Hands (Midnight!) -->
    <line x1="0" y1="0" x2="0" y2="-32" stroke="url(#gold-grad)" stroke-width="4.5" stroke-linecap="round" />
    <line x1="0" y1="0" x2="-3" y2="-22" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round" />
    <!-- Clock marks -->
    <line x1="0" y1="-41" x2="0" y2="-35" stroke="url(#gold-light)" stroke-width="3" />
    <line x1="41" y1="0" x2="35" y2="0" stroke="url(#gold-light)" stroke-width="2" />
    <line x1="0" y1="41" x2="0" y2="35" stroke="url(#gold-light)" stroke-width="2" />
    <line x1="-41" y1="0" x2="-35" y2="0" stroke="url(#gold-light)" stroke-width="2" />
    <!-- Outer suspension ring -->
    <circle cx="0" cy="-56" r="10" fill="none" stroke="url(#gold-grad)" stroke-width="4" />
  </g>

  <!-- Clinking Champagne Flutes at bottom center -->
  <g transform="translate(500, 1160)" filter="url(#deco-shadow)">
    <use href="#champagne-glass" x="-22" y="0" transform="rotate(18 -22 0)" />
    <use href="#champagne-glass" x="22" y="0" transform="scale(-1, 1) rotate(18 22 0)" />
    <!-- Liquid Splash spray -->
    <path d="M 0 -70 Q -10 -90, -5 -100 Q 0 -85, 0 -70 Z" fill="url(#gold-grad)" />
    <path d="M 0 -70 Q 10 -90, 5 -100 Q 0 -85, 0 -70 Z" fill="url(#gold-grad)" />
    <circle cx="-8" cy="-105" r="3.5" fill="#FFF" />
    <circle cx="8" cy="-105" r="3.5" fill="#FFF" />
    <circle cx="0" cy="-115" r="4.5" fill="url(#gold-grad)" />
  </g>

  <!-- Fireworks and sparkles -->
  <use href="#firework" x="220" y="110" transform="scale(1.1)"/>
  <use href="#firework" x="780" y="110" transform="scale(1.1)"/>
  <use href="#firework" x="160" y="1120" transform="scale(0.85)"/>
  <use href="#firework" x="840" y="1120" transform="scale(0.85)"/>
  
  <use href="#sparkle" x="140" y="240" transform="scale(0.8)"/>
  <use href="#sparkle" x="860" y="240" transform="scale(0.8)"/>
  <use href="#sparkle" x="350" y="120"/>
  <use href="#sparkle" x="650" y="120"/>
  
  <use href="#sparkle" x="270" y="1180" transform="scale(0.85)"/>
  <use href="#sparkle" x="730" y="1180" transform="scale(0.85)"/>
  <use href="#sparkle" x="400" y="1160"/>
  <use href="#sparkle" x="600" y="1160"/>

  <!-- Champagne bubbles overlay effect along the sides -->
  <g fill="url(#gold-grad)" opacity="0.65">
    <circle cx="80" cy="300" r="10"/> <circle cx="95" cy="275" r="5.5"/> <circle cx="70" cy="245" r="8"/>
    <circle cx="88" cy="215" r="4"/> <circle cx="74" cy="185" r="6"/> <circle cx="98" cy="155" r="3"/>
    
    <circle cx="920" cy="1000" r="12"/> <circle cx="905" cy="970" r="6.5"/> <circle cx="930" cy="940" r="9"/>
    <circle cx="912" cy="910" r="4"/> <circle cx="928" cy="880" r="7"/> <circle cx="904" cy="850" r="3"/>
    
    <circle cx="90" cy="900" r="8"/> <circle cx="102" cy="870" r="4.5"/> <circle cx="78" cy="840" r="6"/>
    <circle cx="920" cy="400" r="10"/> <circle cx="932" cy="370" r="5.5"/> <circle cx="908" cy="340" r="7"/>
  </g>
</svg>
