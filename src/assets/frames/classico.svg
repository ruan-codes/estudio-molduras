<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Elegant damask pattern for the paper matte texture -->
    <pattern id="damask" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#F4EFE4"/>
      <!-- Subtle vintage beige flourishes -->
      <path d="M 60 10 C 65 30, 85 35, 90 50 C 95 65, 80 80, 60 90 C 40 80, 25 65, 30 50 C 35 35, 55 30, 60 10 Z" fill="#EADFCE" opacity="0.35"/>
      <path d="M 60 110 C 65 90, 85 85, 90 70 C 95 55, 80 40, 60 30 C 40 40, 25 55, 30 70 C 35 85, 55 90, 60 110 Z" fill="#EADFCE" opacity="0.35"/>
      <path d="M 10 60 C 30 65, 35 85, 50 90 C 65 95, 80 80, 90 60 C 80 40, 65 25, 50 30 C 35 35, 30 55, 10 60 Z" fill="#EADFCE" opacity="0.25"/>
      <path d="M 110 60 C 90 65, 85 85, 70 90 C 55 95, 40 80, 30 60 C 40 40, 55 25, 70 30 C 85 35, 90 55, 110 60 Z" fill="#EADFCE" opacity="0.25"/>
      <circle cx="60" cy="60" r="6" fill="#D8CDB8" opacity="0.5"/>
    </pattern>

    <!-- Vintage drop shadow filter to give depth to borders -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#5C4326" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Frame Matte Background (using our damask pattern) -->
  <rect x="0" y="0" width="1000" height="90" fill="url(#damask)"/>
  <rect x="0" y="1090" width="1000" height="160" fill="url(#damask)"/>
  <rect x="0" y="0" width="60" height="1250" fill="url(#damask)"/>
  <rect x="940" y="0" width="60" height="1250" fill="url(#damask)"/>

  <!-- Inner gold/bronze fillet border bordering the photo (window 60x90 to 940x1090) -->
  <rect x="54" y="84" width="892" height="1012" fill="none" stroke="#A68050" stroke-width="6" />
  <rect x="57" y="87" width="886" height="1006" fill="none" stroke="#D3B58D" stroke-width="2" />
  <rect x="60" y="90" width="880" height="1000" fill="none" stroke="#8A6437" stroke-width="2" />

  <!-- Elegant Outmost Border lines -->
  <rect x="15" y="15" width="970" height="1220" fill="none" stroke="#8A6437" stroke-width="2"/>
  <rect x="22" y="22" width="956" height="1206" fill="none" stroke="#A68050" stroke-width="4"/>
  <rect x="30" y="30" width="940" height="1190" fill="none" stroke="#8A6437" stroke-width="1" stroke-dasharray="8 4"/>

  <!-- Ornate Victorian Corner Elements -->
  <g fill="#8A6437">
    <!-- Top-Left Corner Ornament -->
    <path d="M 22 22 L 80 22 C 80 22, 80 40, 60 60 C 40 80, 22 80, 22 80 Z" opacity="0.8"/>
    <path d="M 30 30 Q 55 30 55 55 Q 55 70 70 70 Q 55 70 55 55 Q 55 30 30 30" fill="none" stroke="#8A6437" stroke-width="3"/>
    <circle cx="85" cy="30" r="5"/>
    <circle cx="30" cy="85" r="5"/>
    <circle cx="100" cy="30" r="3"/>
    <circle cx="30" cy="100" r="3"/>

    <!-- Top-Right Corner Ornament -->
    <g transform="translate(1000, 0) scale(-1, 1)">
      <path d="M 22 22 L 80 22 C 80 22, 80 40, 60 60 C 40 80, 22 80, 22 80 Z" opacity="0.8"/>
      <path d="M 30 30 Q 55 30 55 55 Q 55 70 70 70 Q 55 70 55 55 Q 55 30 30 30" fill="none" stroke="#8A6437" stroke-width="3"/>
      <circle cx="85" cy="30" r="5"/>
      <circle cx="30" cy="85" r="5"/>
      <circle cx="100" cy="30" r="3"/>
      <circle cx="30" cy="100" r="3"/>
    </g>

    <!-- Bottom-Left Corner Ornament -->
    <g transform="translate(0, 1250) scale(1, -1)">
      <path d="M 22 22 L 80 22 C 80 22, 80 40, 60 60 C 40 80, 22 80, 22 80 Z" opacity="0.8"/>
      <path d="M 30 30 Q 55 30 55 55 Q 55 70 70 70 Q 55 70 55 55 Q 55 30 30 30" fill="none" stroke="#8A6437" stroke-width="3"/>
      <circle cx="85" cy="30" r="5"/>
      <circle cx="30" cy="85" r="5"/>
      <circle cx="100" cy="30" r="3"/>
      <circle cx="30" cy="100" r="3"/>
    </g>

    <!-- Bottom-Right Corner Ornament -->
    <g transform="translate(1000, 1250) scale(-1, -1)">
      <path d="M 22 22 L 80 22 C 80 22, 80 40, 60 60 C 40 80, 22 80, 22 80 Z" opacity="0.8"/>
      <path d="M 30 30 Q 55 30 55 55 Q 55 70 70 70 Q 55 70 55 55 Q 55 30 30 30" fill="none" stroke="#8A6437" stroke-width="3"/>
      <circle cx="85" cy="30" r="5"/>
      <circle cx="30" cy="85" r="5"/>
      <circle cx="100" cy="30" r="3"/>
      <circle cx="30" cy="100" r="3"/>
    </g>
  </g>

  <!-- Ornate scroll and floral laurel branch around text at the bottom -->
  <g fill="#8A6437" stroke="#8A6437" stroke-width="1.5">
    <!-- Left Laurel Leaf Branch -->
    <path d="M 180 1165 C 220 1150, 280 1150, 330 1165" fill="none" stroke-width="3"/>
    <path d="M 210 1158 C 215 1145, 230 1145, 230 1158 Z" />
    <path d="M 240 1155 C 245 1140, 260 1140, 260 1155 Z" />
    <path d="M 270 1154 C 275 1139, 290 1139, 290 1154 Z" />
    <path d="M 300 1155 C 305 1142, 320 1142, 320 1155 Z" />
    
    <circle cx="170" cy="1165" r="5"/>
    <circle cx="150" cy="1165" r="3"/>

    <!-- Right Laurel Leaf Branch -->
    <g transform="translate(1000, 0) scale(-1, 1)">
      <path d="M 180 1165 C 220 1150, 280 1150, 330 1165" fill="none" stroke-width="3"/>
      <path d="M 210 1158 C 215 1145, 230 1145, 230 1158 Z" />
      <path d="M 240 1155 C 245 1140, 260 1140, 260 1155 Z" />
      <path d="M 270 1154 C 275 1139, 290 1139, 290 1154 Z" />
      <path d="M 300 1155 C 305 1142, 320 1142, 320 1155 Z" />
      
      <circle cx="170" cy="1165" r="5"/>
      <circle cx="150" cy="1165" r="3"/>
    </g>
  </g>

  <!-- Typography with elegant font and spacing -->
  <text x="500" y="1175" font-family="'Georgia', serif" font-size="34" fill="#2E2822" text-anchor="middle" font-style="italic" font-weight="bold" letter-spacing="3">memórias reveladas</text>
  <text x="500" y="1212" font-family="'Courier New', monospace" font-size="14" fill="#8A6437" text-anchor="middle" font-weight="bold" letter-spacing="9">ESTÚDIO DE MOLDURAS</text>
</svg>
